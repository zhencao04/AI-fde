<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI FDE 助手 — 分析中</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════
       Design tokens — Minimal Dashboard library
       ═══════════════════════════════════════════════════════════ */
    :root {
      /* brand */
      --brand-50: #fafafa;
      --brand-100: #f4f4f5;
      --brand-200: #e4e4e7;
      --brand-300: #d4d4d8;
      --brand-400: #a1a1aa;
      --brand-500: #71717a;
      --brand-600: #52525b;
      --brand-700: #3f3f46;
      --brand-800: #27272a;
      --brand-900: #18181b;

      /* background */
      --background-50: #ffffff;
      --background-100: #fafafa;
      --background-200: #f5f5f5;
      --background-300: #e5e5e5;
      --background-400: #d4d4d4;
      --background-500: #a3a3a3;

      /* text */
      --text-50: #fafafa;
      --text-100: #ededed;
      --text-200: #d4d4d4;
      --text-300: #a1a1a1;
      --text-400: #858585;
      --text-500: #6e6e6e;
      --text-600: #525252;
      --text-700: #404040;
      --text-800: #171717;
      --text-900: #0a0a0a;

      /* icon */
      --icon-50: #fafafa;
      --icon-100: #e5e5e5;
      --icon-200: #d4d4d4;
      --icon-300: #b0b0b0;
      --icon-400: #8f8f8f;
      --icon-500: #6e6e6e;
      --icon-600: #525252;
      --icon-700: #404040;
      --icon-800: #262626;
      --icon-900: #0a0a0a;

      /* surfaces */
      --background: var(--background-50);
      --card: var(--background-50);
      --muted: var(--background-100);

      /* foregrounds */
      --foreground: var(--brand-900);
      --card-foreground: var(--brand-900);
      --primary-foreground: var(--brand-50);

      /* roles */
      --primary: var(--brand-900);
      --accent: var(--brand-100);
      --ring: var(--brand-900);

      /* border */
      --border: var(--brand-200);
      --border-strong: var(--brand-300);

      /* alias */
      --color-surface: var(--background);
      --color-text: var(--foreground);
      --color-text-muted: var(--text-400);
      --color-primary: var(--primary);
      --color-primary-foreground: var(--primary-foreground);
      --color-border: var(--border);
      --color-border-strong: var(--border-strong);

      /* project-specific overrides */
      --accent-blue: #2563ef;
      --success-green: #16a34a;

      /* typography */
      --font-sans: Geist, ui-sans-serif, sans-serif, system-ui;
      --font-serif: 'DM Serif Display', ui-serif, serif;
      --font-mono: 'Geist Mono', ui-monospace, monospace;
      --tracking-normal: 0em;
      --tracking-tight: -0.012em;

      /* radius — 25.2px as specified */
      --radius: 25.2px;
      --radius-sm: 0.375rem;

      /* spacing */
      --space-4: 0.25rem;
    }

    /* ═══════════════════════════════════════════════════════════
       Reset & base
       ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: var(--tracking-normal);
      line-height: 1.5;
    }

    button, input { font: inherit; }
    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring);
    }

    /* ═══════════════════════════════════════════════════════════
       Layout — centered, minimal, calm
       ═══════════════════════════════════════════════════════════ */
    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Top nav ─────────────────────────────────────────────── */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 32px;
      border-bottom: 1px solid var(--color-border);
    }
    .logo {
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--color-text);
      color: var(--primary-foreground);
      display: grid;
      place-items: center;
      font-family: var(--font-serif);
      font-size: 0.82rem;
      letter-spacing: -0.02em;
    }
    .nav-spacer { flex: 1; }
    .nav-muted {
      font-size: 0.78rem;
      color: var(--color-text-muted);
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 16px;
      border: 1px solid var(--color-border);
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-text);
      transition: background 180ms ease;
    }
    .btn-back:hover { background: var(--accent); }
    .btn-back:active { transform: scale(0.98); }
    .btn-back svg { flex-shrink: 0; }
    .btn-bell {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--color-text-muted);
      transition: background 180ms ease, color 180ms ease;
    }
    .btn-bell:hover {
      background: var(--accent);
      color: var(--color-text);
    }

    /* ─── Center content ──────────────────────────────────────── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .page-heading {
      text-align: center;
      margin-bottom: 48px;
    }
    .page-heading h1 {
      font-family: var(--font-sans);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: var(--tracking-tight);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .page-heading p {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      line-height: 1.55;
      max-width: 380px;
      margin: 0 auto;
    }

    /* ─── Phase rows ──────────────────────────────────────────── */
    .phases {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 48px;
    }
    .phase {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--background);
      transition: background 180ms ease;
    }
    .phase + .phase {
      border-top: 1px solid var(--color-border);
    }
    .phase:hover { background: var(--muted); }

    .phase-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 500;
    }
    .phase-badge.done {
      background: #f0fdf4;
      color: var(--success-green);
    }
    .phase-badge.active {
      background: #eff6ff;
      color: var(--accent-blue);
    }
    .phase-badge.pending {
      background: var(--background-200);
      color: var(--text-400);
    }

    .phase-info {
      flex: 1;
      min-width: 0;
    }
    .phase-label {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: var(--tracking-tight);
      line-height: 1.3;
      margin-bottom: 2px;
    }
    .phase-meta {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    .phase-bar-wrap {
      width: 120px;
      flex-shrink: 0;
    }
    .phase-bar {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: var(--background-300);
      overflow: hidden;
    }
    .phase-bar-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.3s ease;
    }
    .phase-bar-fill.green { background: var(--success-green); }
    .phase-bar-fill.blue { background: var(--accent-blue); }
    .phase-bar-fill.gray { background: var(--background-400); width: 0 !important; }

    /* pulsing dot for active phase */
    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-blue);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.6s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* animating progress bar */
    .phase-bar-fill.animating {
      animation: fillBar 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes fillBar {
      from { width: 65% !important; }
      to { width: 100%; }
    }

    /* ─── Large stat numbers ───────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      margin-bottom: 40px;
    }
    .stat-card {
      text-align: center;
      padding: 24px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
    }
    .stat-value {
      font-family: var(--font-serif);
      font-size: 2.75rem;
      line-height: 1.1;
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--color-text-muted);
    }

    /* ─── CTA button ──────────────────────────────────────────── */
    .cta-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .btn-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 44px;
      padding: 0 32px;
      border-radius: 999px;
      background: var(--accent-blue);
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: var(--tracking-tight);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 600ms ease 3s forwards;
      transition: transform 120ms ease, opacity 300ms ease;
    }
    .btn-cta:hover { opacity: 0.92; }
    .btn-cta:active { transform: scale(0.97); }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ──────────────────────────────────────────── */
    @media (max-width: 560px) {
      .top-nav { padding: 16px 20px; gap: 12px; }
      .nav-muted { display: none; }
      .center { padding: 32px 16px 48px; }
      .phase { padding: 16px 18px; gap: 12px; }
      .phase-bar-wrap { width: 80px; }
      .stat-value { font-size: 2.25rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ═══════ TOP NAV ═══════ -->
    <nav class="top-nav">
      <div class="logo">
        <div class="logo-mark">F</div>
        AI FDE 助手
      </div>
      <div class="nav-spacer"></div>
      <button class="btn-back" data-dom-id="back-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        返回
      </button>
      <span class="nav-muted">观察期已结束</span>
      <button class="btn-bell" data-dom-id="open-notifications" aria-label="通知">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </button>
    </nav>

    <!-- ═══════ CENTER ═══════ -->
    <main class="center">

      <div class="page-heading">
        <h1>正在分析您的工作流</h1>
        <p>AI 正在处理观察期内收集的数据，为您识别自动化机会。</p>
      </div>

      <!-- Phase rows -->
      <div class="phases">
        <!-- Phase 1: done -->
        <div class="phase">
          <div class="phase-badge done">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="phase-info">
            <div class="phase-label">数据整理</div>
            <div class="phase-meta">2,847 个事件</div>
          </div>
          <div class="phase-bar-wrap">
            <div class="phase-bar">
              <div class="phase-bar-fill green" style="width:100%"></div>
            </div>
          </div>
        </div>

        <!-- Phase 2: done -->
        <div class="phase">
          <div class="phase-badge done">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="phase-info">
            <div class="phase-label">任务聚类</div>
            <div class="phase-meta">8 个重复模式</div>
          </div>
          <div class="phase-bar-wrap">
            <div class="phase-bar">
              <div class="phase-bar-fill green" style="width:100%"></div>
            </div>
          </div>
        </div>

        <!-- Phase 3: active -->
        <div class="phase">
          <div class="phase-badge active">
            <span class="pulse-dot"></span>
          </div>
          <div class="phase-info">
            <div class="phase-label">AI 机会评分</div>
            <div class="phase-meta">评估中...</div>
          </div>
          <div class="phase-bar-wrap">
            <div class="phase-bar">
              <div class="phase-bar-fill blue animating" style="width:65%"></div>
            </div>
          </div>
        </div>

        <!-- Phase 4: pending -->
        <div class="phase">
          <div class="phase-badge pending">
            <span style="width:4px;height:4px;border-radius:50%;background:var(--text-300)"></span>
          </div>
          <div class="phase-info">
            <div class="phase-label">Agent 规格</div>
            <div class="phase-meta">等待中</div>
          </div>
          <div class="phase-bar-wrap">
            <div class="phase-bar">
              <div class="phase-bar-fill gray"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Large stat numbers -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value">2.5</div>
          <div class="stat-label">hours/day savable</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">6</div>
          <div class="stat-label">AI opportunities</div>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap">
        <button class="btn-cta" data-dom-id="view-report">
          查看完整报告
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>

    </main>

  </div>
</body>
</html>
